sonar.projectKey=oguaaman
sonar.projectName=Oguaa Platform
sonar.projectVersion=1.0

sonar.sources=backend,frontend/src,admin/src,marketing/src,mobile/src
sonar.exclusions=**/node_modules/**,**/dist/**,**/gen/**,**/.expo/**,**/uploads/**,**/coverage/**,**/*.pb.go,**/*_test.go,**/*.test.*,**/*.spec.*,**/vite.config.*,**/eslint.config.*

# The marketing site deliberately mirrors the portal's news pages (same newsroom
# content, public brochure surface) — excluded from duplication detection like
# the other accepted twin files (profile-sections, shared types).
sonar.cpd.exclusions=frontend/src/pages/News.tsx,frontend/src/pages/NewsArticle.tsx,marketing/src/pages/NewsPage.tsx,marketing/src/pages/NewsArticlePage.tsx
sonar.tests=backend
sonar.test.inclusions=**/*_test.go

sonar.go.coverage.reportPaths=backend/coverage.out

sonar.sourceEncoding=UTF-8
