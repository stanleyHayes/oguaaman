sonar.projectKey=oguaaman
sonar.projectName=Oguaa Platform
sonar.projectVersion=1.0

sonar.sources=backend,frontend/src,admin/src,marketing/src,mobile/src
sonar.exclusions=**/node_modules/**,**/dist/**,**/gen/**,**/.expo/**,**/uploads/**,**/coverage/**,**/*.pb.go,**/*_test.go,**/*.test.*,**/*.spec.*,**/vite.config.*,**/eslint.config.*,**/seed_schools.go

# The marketing site deliberately mirrors the portal's news pages (same newsroom
# content, public brochure surface). The profile-sections / ai-writing-bar /
# markdown / adinkra components are likewise intentional twins shared across the
# portal, marketing and admin apps — all excluded from duplication detection.
sonar.cpd.exclusions=frontend/src/pages/News.tsx,frontend/src/pages/NewsArticle.tsx,marketing/src/pages/NewsPage.tsx,marketing/src/pages/NewsArticlePage.tsx,frontend/src/components/profile-sections.tsx,marketing/src/components/profile-sections.tsx,frontend/src/components/ai-writing-bar.tsx,admin/src/components/ai-writing-bar.tsx,frontend/src/components/markdown.tsx,marketing/src/components/markdown.tsx,frontend/src/components/adinkra.tsx,marketing/src/components/adinkra.tsx
sonar.tests=backend
sonar.test.inclusions=**/*_test.go

sonar.go.coverage.reportPaths=backend/coverage.out

sonar.sourceEncoding=UTF-8
