# Render Blueprint — Oguaa API (free tier).
# Deploy: Render dashboard → New → Blueprint → pick this repo. Render reads this
# file, builds backend/Dockerfile, and prompts for the sync:false secrets once.
#
# Free-tier notes:
# - The service sleeps after ~15 min idle; first request after a nap takes ~50s.
# - The disk is ephemeral — files under UPLOAD_DIR vanish on redeploy/restart.
#   Durable member images go through Cloudinary (unsigned preset, see
#   frontend/.env.example); first-party /uploads are best-effort on free.
# - Only $PORT is exposed publicly, so the gRPC server (50051) stays internal.
#   The portal talks REST (/api/*) + GraphQL (/graphql) only.
services:
  - type: web
    name: oguaa-api
    runtime: docker
    dockerfilePath: ./backend/Dockerfile
    dockerContext: ./backend
    plan: free
    region: frankfurt # closest Render region to Ghana
    healthCheckPath: /api/health
    envVars:
      # Atlas M0 (free) connection string — paste the mongodb+srv:// URI from
      # Atlas → Database → Connect → Drivers. The live cluster is already seeded.
      - key: MONGODB_URI
        sync: false
      - key: MONGODB_DB
        value: oguaa
      # Render generates a strong secret on first deploy.
      - key: JWT_SECRET
        generateValue: true
      # Encrypts members' TOTP (2FA) secrets at rest with AES-GCM. Render
      # generates it once; the AES key is derived from it via SHA-256. Do not
      # rotate casually — changing it makes existing enrolled 2FA unverifiable
      # (users would re-enroll). Absent => secrets stored plaintext (not advised).
      - key: MFA_ENC_KEY
        generateValue: true
      # Turns on the backend's production safety validation (JWT/CORS/
      # PUBLIC_API_URL must be real, not dev defaults). Fails fast on misconfig.
      - key: GO_ENV
        value: production
      # Enforce real sign-in on writes/admin in production.
      - key: AUTH_REQUIRED
        value: "true"
      # Every Vercel frontend that calls the API, comma-separated (CORS). Add a
      # custom domain here later. Keep in sync with the deployed Vercel URLs:
      #   marketing https://oguaa.vercel.app · citizen/portal https://oguaa-citizen.vercel.app
      #   admin/steward https://oguaa-steward.vercel.app · creator https://oguaa-creator.vercel.app
      - key: ALLOWED_ORIGIN
        value: https://oguaa.vercel.app,https://oguaa-citizen.vercel.app,https://oguaa-steward.vercel.app,https://oguaa-creator.vercel.app
      # The citizen web app (portal) — where payers return after Paystack checkout.
      - key: PUBLIC_PORTAL_URL
        value: https://oguaa-citizen.vercel.app
      # Absolute base for returned image URLs.
      - key: PUBLIC_API_URL
        value: https://oguaa-api.onrender.com
      - key: UPLOAD_DIR
        value: /app/uploads
      - key: PLATFORM_FEE_PERCENT
        value: "5"
      # ── AI: Kimi (Moonshot) is the PRIMARY provider; Anthropic is the backup ──
      - key: KIMI_API_KEY
        sync: false
      - key: KIMI_MODEL
        value: k3 # Kimi K3
      - key: KIMI_BASE_URL
        value: https://api.moonshot.ai/v1
      # Anthropic — optional backup; blank => Kimi only, then labelled simulation.
      - key: ANTHROPIC_API_KEY
        sync: false

      # ── Payments — blank => pledge/escrow runs a labelled simulation ──
      - key: PAYSTACK_SECRET_KEY
        sync: false
      - key: STRIPE_SECRET_KEY # optional — Stripe mobile checkout
        sync: false

      # ── Transactional email (Resend) — password-reset codes, OTPs, notices ──
      # Blank => email is skipped (in-app notices still work). Recommended in
      # production so reset/OTP codes are delivered, not returned in the response.
      - key: RESEND_API_KEY
        sync: false
      - key: EMAIL_FROM
        value: Oguaa <noreply@oguaa.gh> # use a Resend-verified sender

      # ── WhatsApp OTP (Meta WhatsApp Business Cloud API) — optional ──
      # Blank => phone-verification OTP is returned in the API response (dev only).
      - key: WHATSAPP_TOKEN
        sync: false
      - key: WHATSAPP_PHONE_ID
        sync: false

      # ── Web Push (VAPID) — browser safety-alert push (the "ring") ──
      # Generate once: `npx web-push generate-vapid-keys`. Blank => browsers can't
      # subscribe and the ring stays in-app/foreground; Expo (mobile) needs no key.
      - key: VAPID_PUBLIC_KEY
        sync: false
      - key: VAPID_PRIVATE_KEY
        sync: false
      - key: VAPID_SUBJECT
        value: mailto:hello@oguaa.gh
