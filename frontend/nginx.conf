# Social/search crawlers get the backend's OG meta shim instead of the static
# SPA shell (spec §11 — rich link previews are the growth engine). Kept to
# scrapers that don't execute JS; Google/Bing render the SPA themselves.
map $http_user_agent $og_bot {
  default 0;
  "~*(facebookexternalhit|twitterbot|linkedinbot|whatsapp|slackbot|telegrambot|discordbot|pinterest|redditbot|embedly|applebot)" 1;
}

server {
  listen 80;
  server_name _;
  root /usr/share/nginx/html;

  # Proxy API calls to the Go backend (same-origin → no CORS needed).
  location /api/ {
    proxy_pass http://api:8080;
    proxy_set_header Host $host;
    proxy_set_header X-Forwarded-For $remote_addr;
    proxy_read_timeout 60s;
  }

  # Uploaded + embedded seed images (served by the Go backend).
  location /uploads/ {
    proxy_pass http://api:8080;
    proxy_set_header Host $host;
    proxy_read_timeout 60s;
  }

  # Fingerprinted build assets (Vite content hashes) — safe to cache forever.
  location /assets/ {
    add_header Cache-Control "public, max-age=31536000, immutable";
    try_files $uri =404;
  }

  # SPA fallback. The HTML shell always revalidates (ETag → cheap 304s), so a
  # deploy never leaves a cached page pointing at deleted old-hash chunks —
  # that mismatch rendered as a blank page until a manual reload.
  location / {
    add_header Cache-Control "no-cache";
    # Bots: hand the request to the API's meta shim (og:title/og:image/… +
    # a meta-refresh to the real page for any human that lands there).
    # Headers live at location level — proxy_set_header is invalid inside if.
    proxy_set_header Host $host;
    proxy_set_header X-Forwarded-Proto $scheme;
    if ($og_bot) {
      proxy_pass http://api:8080/api/og/page$request_uri;
    }
    try_files $uri $uri/ /index.html;
  }
}
