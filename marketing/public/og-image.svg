  <text x="92" y="330" font-family="Cormorant Garamond, Georgia, serif" font-weight="600" font-size="78" fill="#F6F1E7">The home of Cape Coast.</text>
  <text x="92" y="408" font-family="Spectral, Georgia, serif" font-size="34" fill="#C7A24A">Its music, people, heritage, schools</text>
  <text x="92" y="452" font-family="Spectral, Georgia, serif" font-size="34" fill="#C7A24A">and the ones we remember. Made by us, for us.</text>
