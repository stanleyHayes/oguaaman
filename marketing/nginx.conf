server {
  listen 80;
  server_name _;
  root /usr/share/nginx/html;

  # Live community stats strip reads the Go backend (same-origin → no CORS).
  location /api/ {
    proxy_pass http://api:8080;
    proxy_set_header Host $host;
    proxy_set_header X-Forwarded-For $remote_addr;
    proxy_read_timeout 60s;
  }

  # Static site fallback.
  # Uploaded + embedded seed images (served by the Go backend).
  location /uploads/ {
    proxy_pass http://api:8080;
    proxy_set_header Host $host;
    proxy_read_timeout 60s;
  }

  # Fingerprinted build assets (Vite content hashes) — safe to cache forever.
  location /assets/ {
    add_header Cache-Control "public, max-age=31536000, immutable";
    try_files $uri =404;
  }

  # SPA fallback. The HTML shell always revalidates (ETag → cheap 304s), so a
  # deploy never leaves a cached page pointing at deleted old-hash chunks.
  location / {
    add_header Cache-Control "no-cache";
    try_files $uri $uri/ /index.html;
  }
}
