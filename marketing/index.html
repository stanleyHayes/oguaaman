<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/icon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="theme-color" content="#123F2D" media="(prefers-color-scheme: light)" />
    <meta name="theme-color" content="#05150e" media="(prefers-color-scheme: dark)" />

    <!-- Resolve the theme before first paint (no flash): stored choice wins,
         else the OS preference. Mirrors the client portal (oguaa.theme key). -->
    <script>
      (function () {
        try {
          var saved = localStorage.getItem("oguaa.theme");
          var dark = saved ? saved === "dark" : window.matchMedia("(prefers-color-scheme: dark)").matches;
          document.documentElement.setAttribute("data-theme", dark ? "dark" : "light");
        } catch (e) {}
      })();
    </script>

    <title>Oguaa — the home of Cape Coast</title>
    <meta
      name="description"
      content="Oguaa is the community home of Cape Coast, Ghana — its music, people, heritage, schools, businesses and the ones we remember. Made by us, for us. Join the app."
    />
    <link rel="canonical" href="https://oguaa.gh/" />

    <!-- Open Graph -->
    <meta property="og:type" content="website" />
    <meta property="og:site_name" content="Oguaa" />
    <meta property="og:title" content="Oguaa — the home of Cape Coast" />
    <meta
      property="og:description"
      content="The community home of Cape Coast: its music, people, heritage, institutions and the ones we remember. Made by us, for us."
    />
    <meta property="og:url" content="https://oguaa.gh/" />
    <meta property="og:image" content="/og-image.svg" />
    <meta property="og:locale" content="en_GH" />

    <!-- Twitter -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="Oguaa — the home of Cape Coast" />
    <meta
      name="twitter:description"
      content="The community home of Cape Coast: music, people, heritage, institutions and remembrance. Made by us, for us."
    />
    <meta name="twitter:image" content="/og-image.svg" />

    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,400;0,9..144,500;0,9..144,600;0,9..144,700;1,9..144,400;1,9..144,500&family=JetBrains+Mono:wght@500&family=Outfit:wght@400;500;600;700&display=swap"
      rel="stylesheet"
    />

    <!-- Structured data: the organisation behind the platform. -->
    <script type="application/ld+json">
      {
        "@context": "https://schema.org",
        "@type": "Organization",
        "name": "Oguaa",
        "description": "The community home of Cape Coast, Ghana — its music, people, heritage, institutions and remembrance.",
        "url": "https://oguaa.gh/",
        "areaServed": "Cape Coast, Central Region, Ghana"
      }
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
