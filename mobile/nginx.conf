server {
  listen 80;
  server_name _;
  root /usr/share/nginx/html;

  # Keep trailing-slash redirects relative — the container listens on :80 but
  # is published on :3002, so an absolute redirect would drop the port and
  # send the browser to a dead origin (breaks refresh/deep-links on directory
  # routes like /festivals).
  absolute_redirect off;

  location /api/ {
    proxy_pass http://api:8080;
    proxy_set_header Host $host;
    proxy_set_header X-Forwarded-For $remote_addr;
    proxy_read_timeout 60s;
  }

  # Expo Router web uses clean paths — fall back to index.html.
  # Uploaded + embedded seed images (served by the Go backend).
  location /uploads/ {
    proxy_pass http://api:8080;
    proxy_set_header Host $host;
    proxy_read_timeout 60s;
  }

  # Fingerprinted build assets (Expo/Metro content hashes) — cache forever.
  location /_expo/ {
    add_header Cache-Control "public, max-age=31536000, immutable";
    try_files $uri =404;
  }

  # The HTML shell always revalidates (ETag → cheap 304s), so a deploy never
  # leaves a cached page pointing at deleted old-hash chunks.
  location / {
    add_header Cache-Control "no-cache";
    try_files $uri $uri.html $uri/ /index.html;
  }
}
